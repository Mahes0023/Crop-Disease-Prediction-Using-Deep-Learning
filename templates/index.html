<!DOCTYPE html>
<html>
<head>
    <title>AI Crop Monitoring</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #d4fc79, #96e6a1);
            margin: 0;
        }

        .container {
            margin-top: 60px;
            padding: 30px;
            background: white;
            width: 420px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            color: #2e7d32;
            margin-bottom: 20px;
        }

        input {
            margin-bottom: 15px;
        }

        button {
            padding: 12px 25px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #1b5e20;
        }

        img {
            width: 200px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .result-card {
            margin-top: 20px;
            padding: 15px;
            background: #f1f8e9;
            border-radius: 10px;
            text-align: left;
        }

        .spinner {
            margin-top: 20px;
            border: 6px solid #f3f3f3;
            border-top: 6px solid #2e7d32;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>

<body>

<div class="container">
    <h2>🌿 AI Crop Monitoring</h2>

    <input type="file" id="imageInput" accept="image/*">
    <br>

    <button onclick="uploadImage()">Predict</button>

    <div id="preview"></div>
    <div id="result"></div>
</div>

<script>
function uploadImage() {
    let fileInput = document.getElementById("imageInput");
    let file = fileInput.files[0];

    if (!file) {
        alert("Please select an image!");
        return;
    }

    // 🔹 Image preview
    let reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById("preview").innerHTML = `
            <img src="${e.target.result}" />
        `;
    };
    reader.readAsDataURL(file);

    // 🔹 Spinner
    document.getElementById("result").innerHTML = `
        <div class="spinner"></div>
        <p>Analyzing crop...</p>
    `;

    let formData = new FormData();
    formData.append("file", file);

    fetch("http://127.0.0.1:5001/predict", {
        method: "POST",
        body: formData
    })
    .then(res => {
        if (!res.ok) throw new Error("Server error");
        return res.json();
    })
    .then(data => {

        if (data.error) {
            document.getElementById("result").innerHTML = `<p>${data.error}</p>`;
            return;
        }

        document.getElementById("result").innerHTML = `
            <div class="result-card">
                <h3>🌱 Result</h3>
                <p><b>Disease:</b> ${data.disease}</p>
                <p><b>Confidence:</b> ${data.confidence}%</p>
                <p><b>Soil Condition:</b> ${data.soil_condition}</p>
                <p><b>Pest Risk:</b> ${data.pest_risk}</p>
                <p><b>Solution:</b> ${data.solution}</p>
            </div>
        `;
    })
    .catch(err => {
        document.getElementById("result").innerHTML = `<p>${err.message}</p>`;
    });
}
</script>

</body>
</html>
